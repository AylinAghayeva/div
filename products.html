<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Document</title>
</head>
<body>
      <section class="home-one">
    <div id="header">
        <a href="./index.html">
        <div class="img-main">
            <img class="logo" src="./img/logo.jpg" alt="logo">
        </div>
        </a>
        <div class="main-list">
<ul class="header-li">
    <a href="./index.html"><li>Home</li></a>
    <a href="./products.html"><li>Products</li></a>
    <a href="./about.html"><li>About</li></a>
    <a href="./contact.html"><li>Contact</li></a>
</ul>
        <a href="./products.html"></div>
        <div class="main-icon">
            <i class="fa-solid fa-cart-shopping" style="color: #ffffff;"></i>
        </div>
    </a>
    </div>
    </section>
    <section class="product">
        <header>
            <h1>List product</h1>
            <div class="iconCart">
                <img src="./img/shop.png" alt="">
                <div class="totalQuantity">0</div>
            </div>
        </header>
        <div class="listProduct">
            <div class="item">
                <img src="./img/3.jpg">
                <h2>Product name</h2>
                <div class="price">$50</div>
                <button>Add To Cart</button>
            </div>
        </div>
        <div class="cart">
            <h2>Cart</h2>
            <div class="listCart">
                <div class="item">
                    <img class="cart-img" src="./img/4.jpg">
                    <div class="content">
                        <div class="name">
                            Product Name
                        </div>
                        <div class="price">
                            $50/1 product
                        </div>
                    </div>
                    <div class="quantity">
                        <button>-</button>
                        <span class="value">3</span>
                        <button>+</button>
                    </div>
                </div>
            </div>
            <div class="buttons">
                <div class="close">Close</div>
                <div class="checkout">
                    <a href="checkout.html">
                        Checkout
                    </a>
                </div>
            </div>
        </div>
    </section>
    <footer>
<div class="main-footer">
    <div class="footer-flex"><h3>Connect with us</h3>
<i class="fa-brands fa-instagram" style="color: rgb(255, 255, 255);"></i>
<i class="fa-brands fa-facebook" style="color: rgb(255, 255, 255);"></i></i>
<i class="fa-brands fa-twitter" style="color: rgb(255, 255, 255);"></i>
<i class="fa-brands fa-youtube" style="color: rgb(255, 255, 255);"></i></div>
</div>
</div>
</footer>
    <script src="app.js"></script>
</body>
</html>
